# Cloud Build config for the AddressLabelPro frontend.
#
# `gcloud run deploy --source` accepts --set-build-env-vars, but with a
# Dockerfile those vars become env-of-the-build-step, NOT `docker build
# --build-arg`. Next.js needs `NEXT_PUBLIC_*` at *build* time to inline
# them into the client bundle, so without proper --build-arg the bundle
# ships with `undefined` and the Supabase JS client falls back to
# `http://localhost:9999`.
#
# Run with:
#   gcloud builds submit ./frontend --config=./frontend/cloudbuild.yaml \
#     --substitutions=_API_URL=...,_SUPABASE_URL=...,_SUPABASE_ANON_KEY=...
#
# Followed by:
#   gcloud run deploy addresslabelpro-frontend \
#     --image=<output-image> --region=us-central1 ...

substitutions:
  _API_URL: ""              # e.g. https://addresslabelpro-backend-XXX.run.app/api
  _SUPABASE_URL: ""         # e.g. https://lhrgtqefhppixikvupuv.supabase.co
  _SUPABASE_ANON_KEY: ""    # sb_publishable_...

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_API_URL=${_API_URL}
      - --build-arg=NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}
      - --build-arg=NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}
      - -t
      - us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/addresslabelpro-frontend:latest
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/addresslabelpro-frontend:latest

images:
  - us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/addresslabelpro-frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
